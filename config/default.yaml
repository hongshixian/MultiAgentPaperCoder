# Default configuration for MultiAgentPaperCoder

# LLM Configuration
llm:
  provider: zhipu  # Options: claude, zhipu
  claude:
    model: claude-3-5-sonnet-20241022
  zhipu:
    model: glm-5
    base_url: https://open.bigmodel.cn/api/paas/v4
  max_tokens: 4096
  temperature: 0.7

# Execution Configuration
execution:
  conda_env: py12pt
  output_dir: ./output
  max_retries: 3
  timeout_seconds: 300

# Logging
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR
