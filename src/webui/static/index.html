<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiAgentPaperCoder WebUI</title>
<style>
  :root { --bg: #0f0f14; --panel: #1a1a24; --border: #2a2a3a; --text: #e0e0e0; --muted: #888; --accent: #6c8cff; --green: #4caf50; --red: #f44336; --amber: #ff9800; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }
  header { background: var(--panel); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:18px; font-weight:600; }
  header .badge { font-size:12px; background: var(--accent); color:#fff; padding:2px 8px; border-radius:10px; }
  main { max-width: 960px; margin: 24px auto; padding: 0 24px; }
  .card { background: var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; }
  .card h3 { font-size:15px; margin-bottom:4px; }
  .card .meta { font-size:12px; color: var(--muted); }
  .status { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .status.pending { background: #333; color:#aaa; }
  .status.running { background: #1a3a5c; color: #6c8cff; }
  .status.passed { background: #1a3a1a; color: var(--green); }
  .status.failed { background: #3a1a1a; color: var(--red); }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border:1px solid var(--border); border-radius:6px; background: var(--panel); color: var(--text); cursor:pointer; font-size:13px; transition:.15s; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color:#fff; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .empty { text-align:center; padding:48px; color: var(--muted); }
  .empty p { margin-bottom:16px; }
  /* Form */
  form { display:flex; flex-direction:column; gap:12px; }
  label { font-size:13px; color: var(--muted); }
  input[type="file"], input[type="number"] { padding:8px; background: var(--bg); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:14px; }
  input[type="number"] { width:100px; }
  /* Detail */
  .detail-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .detail-grid .item { padding:8px; background: var(--bg); border-radius:4px; }
  .detail-grid .label { font-size:11px; color: var(--muted); }
  .detail-grid .value { font-size:14px; margin-top:2px; word-break:break-all; }
  .log-box { background: var(--bg); border-radius:4px; padding:12px; font-family: monospace; font-size:12px; white-space:pre-wrap; max-height:300px; overflow-y:auto; }
  .back-link { font-size:13px; color: var(--accent); text-decoration:none; margin-bottom:16px; display:inline-block; }
  #ws-status { font-size:11px; color: var(--muted); }
  #ws-status.connected { color: var(--green); }
  .section { margin-top:16px; }
  .section h4 { font-size:13px; margin-bottom:8px; color: var(--muted); }
  /* Tabs */
  .tabs { display:flex; gap:0; margin-bottom:16px; }
  .tab { padding:8px 16px; border:1px solid var(--border); background: var(--panel); color: var(--muted); cursor:pointer; font-size:13px; }
  .tab:first-child { border-radius:6px 0 0 6px; }
  .tab:last-child { border-radius:0 6px 6px 0; }
  .tab.active { background: var(--accent); border-color: var(--accent); color:#fff; }
  .view { display:none; }
  .view.active { display:block; }
</style>
</head>
<body>
<header>
  <h1>📄 MultiAgentPaperCoder</h1>
  <span class="badge">WebUI</span>
</header>

<main>
  <div class="tabs">
    <button class="tab active" onclick="showView('list')">📋 任务列表</button>
    <button class="tab" onclick="showView('new')">➕ 新建任务</button>
  </div>

  <!-- Task List View -->
  <div id="view-list" class="view active">
    <div id="task-list"></div>
    <div id="empty-state" class="empty">
      <p>暂无任务</p>
      <button class="btn primary" onclick="showView('new')">创建第一个任务</button>
    </div>
  </div>

  <!-- New Task View -->
  <div id="view-new" class="view">
    <a class="back-link" href="#" onclick="showView('list')">← 返回列表</a>
    <div class="card">
      <h3>新建论文复现任务</h3>
      <form id="new-task-form" onsubmit="createTask(event)">
        <label>📎 上传 PDF 论文</label>
        <input type="file" id="pdf-file" accept=".pdf" required>
        <label>🔁 最大重试次数</label>
        <input type="number" id="max-iter" value="5" min="1" max="20">
        <button type="submit" class="btn primary">🚀 开始复现</button>
      </form>
    </div>
  </div>

  <!-- Task Detail View (rendered dynamically) -->
  <div id="view-detail" class="view"></div>
</main>

<span id="ws-status" style="position:fixed;bottom:12px;right:16px;">⚫ 离线</span>

<script>
const BASE = '';
let activeTaskId = null;

// ── Navigation ──
function showView(name, taskId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (name === 'list') {
    document.getElementById('view-list').classList.add('active');
    document.querySelector('.tab:nth-child(1)').classList.add('active');
    loadTasks();
  } else if (name === 'new') {
    document.getElementById('view-new').classList.add('active');
    document.querySelector('.tab:nth-child(2)').classList.add('active');
  } else if (name === 'detail') {
    document.getElementById('view-detail').classList.add('active');
    activeTaskId = taskId;
    loadDetail(taskId);
  }
}

// ── Task List ──
async function loadTasks() {
  const el = document.getElementById('task-list');
  const empty = document.getElementById('empty-state');
  try {
    const tasks = await fetch(BASE + '/api/tasks').then(r => r.json());
    if (!tasks.length) { el.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    el.innerHTML = tasks.map(t => `
      <div class="card" style="cursor:pointer" onclick="showView('detail','${t.id}')">
        <h3>📄 ${esc(t.pdf_name)}</h3>
        <div class="meta">
          <span class="status ${t.status}">${statusIcon(t.status)} ${t.status}</span>
          &nbsp;·&nbsp; ${fmtTime(t.created_at)}
          &nbsp;·&nbsp; 迭代 ${t.iteration_count || 0}/${t.max_iterations}
        </div>
      </div>
    `).join('');
  } catch(e) { el.innerHTML = '<div class="empty"><p>加载失败: ' + esc(e.message) + '</p></div>'; }
}

// ── Create Task ──
async function createTask(e) {
  e.preventDefault();
  const file = document.getElementById('pdf-file').files[0];
  const maxIter = document.getElementById('max-iter').value;
  if (!file) return;
  const form = new FormData();
  form.append('pdf', file);
  form.append('max_iterations', maxIter);
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = '⏳ 提交中...';
  try {
    const res = await fetch(BASE + '/api/tasks', { method:'POST', body:form });
    const data = await res.json();
    showView('detail', data.id);
  } catch(err) {
    alert('创建失败: ' + err.message);
  }
  btn.disabled = false; btn.textContent = '🚀 开始复现';
  document.getElementById('new-task-form').reset();
}

// ── Task Detail ──
async function loadDetail(taskId) {
  const el = document.getElementById('view-detail');
  el.innerHTML = '<div class="empty"><p>⏳ 加载中...</p></div>';
  try {
    const t = await fetch(BASE + '/api/tasks/' + taskId).then(r => r.json());
    el.innerHTML = `
      <a class="back-link" href="#" onclick="showView('list')">← 返回列表</a>
      <div class="card">
        <h3>📄 ${esc(t.pdf_name)} <span class="status ${t.status}">${statusIcon(t.status)} ${t.status}</span></h3>
        <div class="meta">ID: ${t.id} · 创建于 ${fmtTime(t.created_at)}</div>
      </div>
      <div class="detail-grid">
        <div class="item"><div class="label">当前节点</div><div class="value">${t.current_node || '-'}</div></div>
        <div class="item"><div class="label">迭代次数</div><div class="value">${t.iteration_count || 0} / ${t.max_iterations}</div></div>
        <div class="item"><div class="label">分析状态</div><div class="value">${t.analysis_status || '-'}</div></div>
        <div class="item"><div class="label">生成状态</div><div class="value">${t.generation_status || '-'}</div></div>
        <div class="item"><div class="label">验证结果</div><div class="value">${t.verification_passed === 1 ? '✅ 通过' : t.verification_passed === 0 ? '❌ 未通过' : '-'}</div></div>
        <div class="item"><div class="label">修复状态</div><div class="value">${t.repair_status || '-'}</div></div>
      </div>
      ${t.error_cause ? `<div class="card section"><h4>⚠️ 错误信息</h4><div class="log-box">${esc(t.error_cause)}</div></div>` : ''}
      ${t.stdout_summary ? `<div class="card section"><h4>📋 运行日志</h4><div class="log-box">${esc(t.stdout_summary)}</div></div>` : ''}
    `;
  } catch(err) {
    el.innerHTML = `<div class="empty"><p>加载失败: ${esc(err.message)}</p></div>`;
  }
}

// ── WebSocket ──
let ws;
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    document.getElementById('ws-status').textContent = '🟢 已连接';
    document.getElementById('ws-status').className = 'connected';
  };
  ws.onclose = () => {
    document.getElementById('ws-status').textContent = '⚫ 离线';
    document.getElementById('ws-status').className = '';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'task_update' && data.task_id === activeTaskId) {
      loadDetail(activeTaskId);
    }
    // Refresh list if visible
    if (document.getElementById('view-list').classList.contains('active')) {
      loadTasks();
    }
  };
}

// ── Helpers ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(iso) { return new Date(iso).toLocaleString('zh-CN'); }
function statusIcon(s) { return {pending:'⏳', running:'🔄', passed:'✅', failed:'❌'}[s] || '❓'; }

// ── Init ──
loadTasks();
connectWS();
</script>
</body>
</html>
