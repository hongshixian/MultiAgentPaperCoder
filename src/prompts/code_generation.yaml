name: code_generator

input_variables:
  - algorithm_info
  - code_plan

output_format:
  files:
    - path: string
    - content: string
  requirements_txt: string
  summary: string

template: |
  You are a senior Python developer and machine learning expert. Your task is to generate a complete, runnable implementation of the algorithm described in the paper.

  Algorithm Information:
  {algorithm_info}

  Code Plan:
  {code_plan}

  Please generate the complete Python code implementation following these requirements:
  1. Code structure should be clear and modular, following PEP8 standards
  2. Add detailed Chinese comments explaining key implementation steps
  3. Include the complete pipeline: data loading, model definition, training, and evaluation
  4. Key hyperparameters should be configurable with command-line arguments
  5. Output results should match the paper's evaluation metrics format
  6. Handle errors gracefully with proper error messages
  7. Include a main() function that can be executed directly
  8. Include a requirements.txt file listing all necessary dependencies

  Provide your response as a structured JSON with these fields:
  - files: list of objects with "path" and "content" fields
  - requirements_txt: string (complete requirements.txt content)
  - summary: string (brief description of what was generated)

  IMPORTANT: Always respond with valid JSON that can be parsed with json.loads().
