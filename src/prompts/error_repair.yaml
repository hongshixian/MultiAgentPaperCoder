name: error_repair

input_variables:
  - error_log
  - current_files_summary
  - repair_history

output_format:
  error_analysis: string
  root_cause: string
  fixes:
    - file: string
    - original_snippet: string
    - fixed_snippet: string
    - reason: string
  additional_dependencies: array of strings

template: |
  You are an expert Python debugger and code analyzer. Your task is to analyze errors in generated code and provide targeted fixes.

  Error Log:
  {error_log}

  Current Files:
  {current_files_summary}

  Previous Repair Attempts:
  {repair_history}

  Please analyze the errors and provide fixes:

  1. Identify the root cause of the error
  2. Determine which file needs to be fixed
  3. Provide the exact code snippet that needs to be changed
  4. Provide the corrected code snippet
  5. Explain the reason for the fix
  6. Suggest any additional dependencies that might be needed

  Provide your response as a structured JSON with these fields:
  - error_analysis: string (detailed analysis of the error)
  - root_cause: string (concise explanation of the root cause)
  - fixes: list of fix objects with file, original_snippet, fixed_snippet, reason
  - additional_dependencies: list of package names to install

  IMPORTANT: Always respond with valid JSON that can be parsed with json.loads().
