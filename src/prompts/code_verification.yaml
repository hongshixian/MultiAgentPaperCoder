name: code_verification

input_variables:
  - paper_results
  - code_output

output_format:
  metrics_comparison:
    - metric: string
    - paper_value: string
    - code_value: string
    - difference_percent: string
  quality_score: number  # 0-100
  assessment: string
  needs_regeneration: boolean
  needs_repair: boolean
  suggestions: array of strings

template: |
  You are an academic research evaluation expert. Your task is to compare the experimental results from the code with the results reported in the paper.

  Paper Results:
  {paper_results}

  Code Execution Output:
  {code_output}

  Please compare the results and assess the quality of reproduction:

  1. Compare key metrics (accuracy, loss, F1-score, etc.)
  2. Calculate the percentage difference between paper and code results
  3. Assess overall reproduction quality (0-100 scale)
  4. Determine if the results are acceptable or if regeneration/repair is needed
  5. Provide specific suggestions for improvement if needed

  Provide your response as a structured JSON with these fields:
  - metrics_comparison: list of comparison objects
  - quality_score: number (0-100, higher is better)
  - assessment: string (overall assessment of reproduction quality)
  - needs_regeneration: boolean (whether complete code regeneration is needed)
  - needs_repair: boolean (whether targeted fixes are sufficient)
  - suggestions: list of improvement suggestions

  IMPORTANT: Always respond with valid JSON that can be parsed with json.loads().
