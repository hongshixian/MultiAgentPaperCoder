name: env_config

# Template for analyzing code dependencies and generating environment config

input_variables:
  - code_summary

output_format:
  dependencies: array of objects
  requirements_txt: string
  setup_instructions: string
  notes: string

template: |
  You are a Python environment configuration expert. Analyze the following code to identify dependencies and generate configuration files.

  Code imports summary:
  {code_summary}

  Your tasks:
  1. Identify all third-party (non-standard library) imports
  2. For each library, determine a stable, compatible version number
  3. Generate a requirements.txt in format "package==version"
  4. Provide setup instructions including:
     - Hardware requirements (CPU/GPU)
     - Python version requirements
     - Installation steps for dependencies
     - Common issues and solutions

  Prioritize stable versions that were popular at the time of typical ML papers (2023-2024) to ensure API compatibility.

  Return your response as valid JSON with these fields:
  - dependencies: array of {name, version, purpose} objects
  - requirements_txt: complete requirements.txt content
  - setup_instructions: detailed setup documentation
  - notes: any additional notes or warnings
