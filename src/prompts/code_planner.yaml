name: code_planner

# Template for planning code implementation from algorithm analysis

input_variables:
  - algorithm_info

output_format:
  project_structure: array of objects
  implementation_steps: array of strings
  dependencies:
    python_packages: array of strings
    system_packages: array of strings
  entry_points: array of strings
  test_plan: string

template: |
  You are an expert software architect planning to implementation of a machine learning algorithm based on a research paper.

  Algorithm Information:
  {algorithm_info}

  Based on algorithm information above, create a comprehensive implementation plan. Consider:

  1. Project Structure:
     - Main script for training/inference
     - Data loading module
     - Model definition module
     - Configuration file
     - Utility functions (if needed)
     - Test script

  2. Implementation Steps:
     - Break down of implementation into clear, sequential steps
     - Each step should be implementable and testable

  3. Dependencies:
     - List all required Python packages with versions
     - Identify any system dependencies

  4. Entry Points:
     - Main training script
     - Testing/evaluation script (if applicable)

  5. Testing Plan:
     - How to validate implementation
     - What metrics to use
     - Test data requirements

  Provide your response as a structured JSON with these fields:
  - project_structure: list of dicts with fields:
    - path: string (relative path)
    - description: string (what this file contains)
    - type: string (script, module, config, etc.)
  - implementation_steps: list of strings (sequential steps)
  - dependencies: dict with fields:
    - python_packages: list of strings (package==version)
    - system_packages: list of strings
  - entry_points: list of strings (main entry point files)
  - test_plan: string (testing strategy)

  IMPORTANT: Always respond with valid JSON that can be parsed with json.loads().
