name: result_verification

# Template for comparing result verification results

input_variables:
  - paper_results
  - code_output

output_format:
  metrics_comparison: array of objects
  quality_score: number
  assessment: string
  needs_regeneration: boolean
  needs_repair: boolean
  suggestions: array of strings

template: |
  You are an academic research evaluation expert. Compare experimental results and assess reproduction quality.

  Paper-reported results/algorithm details:
  {paper_results}

  Code execution output:
  {code_output}

  Your tasks:
  1. Extract and compare the same evaluation metrics from both sources
  2. Calculate relative differences for each metric (percentage)
  3. Assess overall reproduction quality (0-100 score)
  4. Determine if results need further action:
     - needs_repair: true if code has errors or major implementation issues
     - needs_regeneration: true if results differ significantly from paper (>15%)
  5. Provide specific suggestions for improvement

  Evaluation criteria:
  - Difference < 5%: Excellent quality, no action needed
  - Difference 5-15%: Acceptable quality, suggest improvements
  - Difference > 15%: Poor quality, needs regeneration

  Return your response as valid JSON with these fields:
  - metrics_comparison: array of {metric, paper_value, code_value, difference_percent}
  - quality_score: number (0-100)
  - assessment: string summary of evaluation
  - needs_regeneration: boolean
  - needs_repair: boolean
  - suggestions: array of specific improvement suggestions
